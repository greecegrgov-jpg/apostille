<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apostille Verification Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background-image:url('images/bg.jpg');
    background-size:cover;
    background-attachment:fixed;
    font-family:Arial;
}

.topbar{
    background:#006633;
    color:white;
    padding:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.card-box{
    background:white;
    padding:30px;
    border-radius:10px;
    margin-top:40px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

.verify-btn{
    width:100%;
}

.status{
    background:#198754;
    color:white;
    padding:10px;
    border-radius:5px;
    text-align:center;
    margin-top:20px;
    font-weight:bold;
}

iframe{
    border:none;
    border-radius:10px;
    margin-top:20px;
}

.footer{
    margin-top:50px;
    background:#006633;
    color:white;
    text-align:center;
    padding:15px;
}

</style>

</head>

<body>

<div class="topbar">

<img
src="images/logo.png"
width="80">

<br><br>

Apostille Verification Portal

</div>

<div class="container">

<div class="card-box">

<h3 class="mb-4">
Document Verification
</h3>

<input
type="text"
class="form-control"
placeholder="Enter Tracking Number">

<button class="btn btn-success mt-3 verify-btn">
Verify Document
</button>

<div class="status">
Verified Successfully
</div>

<h4 class="mt-4">
Preview Apostille
</h4>

<iframe
src="pdf/preview/apostille.pdf"
width="100%"
height="600">
</iframe>

<a
href="pdf/downloadable/sample.pdf"
download
class="btn btn-primary mt-3">

Download PDF
</a>

</div>

</div>

<div class="footer">
2026 Apostille Verification Portal
</div>

</body>
</html>
